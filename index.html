      --panel: #0b0d11;
      --line: #2a2f38;
      --text: #f4f6f8;
      --muted: #9ca3af;
      --green: #24f5a0;
      --yellow: #f0b90b;
      --toast: #cfcfcf;
      --toast-text: #111318;
      --red: #ef4444;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    button, input { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .side {
      padding: 20px;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 3px;
      background: #050608;
      color: #fff;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 { margin: 0; font-size: 20px; line-height: 1.1; letter-spacing: 0; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }

    .controls {
      display: grid;
      gap: 13px;
      margin-bottom: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: #c8ced8;
      font-size: 13px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      border: 1px solid var(--line);
      background: #07090c;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      padding: 10px 11px;
      background: transparent;
      color: var(--text);
    }

    .suffix {
      padding-right: 11px;
      color: var(--muted);
      font-size: 13px;
    }

    .add-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .add-row input {
      border: 1px solid var(--line);
      background: #07090c;
    }

    .add-row button {
      border: 1px solid rgba(36, 245, 160, 0.45);
      border-radius: 4px;
      background: rgba(36, 245, 160, 0.1);
      color: var(--green);
      cursor: pointer;
      padding: 0 15px;
      font-weight: 700;
      box-shadow: none;
      transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .add-row button:hover {
      border-color: rgba(36, 245, 160, 0.75);
      background: rgba(36, 245, 160, 0.16);
      color: #eafff5;
    }

    .quick-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .sound-button,
    .notify-button {
      display: grid;
      place-items: center;
      width: 44px;
      min-height: 34px;
      border: 1px solid #323844;
      background: #080a0e;
      color: #707987;
      cursor: pointer;
      justify-self: end;
    }

    .sound-button.on,
    .notify-button.on {
      border-color: rgba(36, 245, 160, 0.58);
      background: rgba(36, 245, 160, 0.12);
      color: var(--green);
    }

    .sound-button svg,
    .notify-button svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
    }

    .status {
      display: grid;
      gap: 9px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .status-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .status-line strong {
      color: var(--text);
      text-align: right;
    }

    .watch {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .watch-title {
      margin-bottom: 8px;
      color: #c8ced8;
      font-size: 13px;
    }

    .coin {
      position: relative;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) 102px 28px;
      align-items: center;
      min-height: 34px;
      border: 1px solid #252b35;
      background: #080a0e;
      color: #d8dde6;
      font-size: 13px;
    }

    .coin + .coin { border-top: 0; }

    .drag-handle {
      display: grid;
      place-items: center;
      width: 26px;
      height: 32px;
      color: #67707d;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .drag-handle:active { cursor: grabbing; }

    .coin.dragging {
      opacity: 0.48;
      outline: 1px solid rgba(240, 185, 11, 0.45);
    }

    .coin-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-left: 9px;
      font-weight: 600;
      cursor: pointer;
    }

    .coin-name:hover { color: var(--green); }

    .coin-percent-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 102px;
      padding-left: 4px;
    }

    .coin-percent {
      min-width: 72px;
      padding: 0 4px 0 0;
      color: var(--green);
      text-align: right;
      font-weight: 800;
    }

    .coin-percent.idle { color: var(--muted); font-weight: 600; }
    .coin-percent.hot { color: var(--green); }

    .threshold-toggle {
      display: grid;
      place-items: center;
      width: 20px;
      height: 24px;
      border: 0;
      background: transparent;
      color: #718092;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
    }

    .threshold-toggle:hover,
    .threshold-toggle.open {
      color: var(--green);
    }

    .threshold-panel {
      position: absolute;
      right: 28px;
      top: 30px;
      z-index: 20;
      display: none;
      width: 138px;
      padding: 8px;
      border: 1px solid #25303c;
      background: #070b10;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.35);
    }

    .threshold-panel.open { display: block; }

    .threshold-label {
      margin-bottom: 5px;
      color: #8492a5;
      font-size: 11px;
    }

    .threshold-editor {
      display: grid;
      grid-template-columns: 1fr 18px;
      align-items: center;
      border: 1px solid #252b35;
      background: #05070a;
    }

    .coin-threshold {
      width: 100%;
      height: 24px;
      border: 0;
      background: transparent;
      color: #cfd6e2;
      text-align: right;
      font: inherit;
      font-size: 12px;
      outline: none;
    }

    .coin-threshold::placeholder { color: #596372; }

    .coin-threshold:focus {
      color: var(--green);
    }

    .threshold-unit {
      color: #778395;
      font-size: 12px;
      text-align: center;
    }

    .remove {
      display: grid;
      place-items: center;
      width: 28px;
      height: 32px;
      border: 0;
      border-left: 1px solid #252b35;
      background: transparent;
      color: #aeb5c1;
      cursor: pointer;
      font-size: 18px;
    }

    .remove:hover { color: var(--red); }

    .main {
      position: relative;
      min-width: 0;
      min-height: 100vh;
      overflow: hidden;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
    }

    .empty-logo {
      width: clamp(150px, 18vw, 280px);
      max-width: 34%;
      opacity: 0.075;
      filter: drop-shadow(0 0 28px rgba(255, 255, 255, 0.08));
      user-select: none;
    }

    .alerts {
      position: absolute;
      top: 22px;
      right: 22px;
      width: min(430px, calc(100vw - 44px));
      height: 180px;
      z-index: 3;
    }

    .alert {
      position: absolute;
      inset: 0;
      min-height: 160px;
      overflow: hidden;
      border: 1px solid rgba(36, 245, 160, 0.82);
      border-left: 8px solid var(--green);
      border-radius: 10px;
      background:
        radial-gradient(circle at 16% 50%, rgba(36, 245, 160, 0.14), transparent 34%),
        linear-gradient(135deg, rgba(10, 20, 22, 0.98), rgba(5, 8, 12, 0.98));
      color: #f5f7fa;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.56), 0 0 28px rgba(36, 245, 160, 0.18);
      cursor: pointer;
      text-align: left;
      transition: transform 0.16s ease, opacity 0.16s ease, filter 0.16s ease;
    }

    .alert::before {
      content: "";
      position: absolute;
      left: -8px;
      top: 0;
      bottom: 0;
      width: 46px;
      background: linear-gradient(90deg, rgba(36, 245, 160, 0.34), transparent);
      pointer-events: none;
    }

    .alert:hover { filter: brightness(1.08); }

    .alert-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 0 50px;
      color: var(--green);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .alert-head > span {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .alert-head > span::before {
      content: "↗";
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      color: var(--green);
      font-size: 26px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .close-alert {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border: 0;
      background: transparent;
      color: rgba(244, 246, 248, 0.72);
      line-height: 1;
      cursor: pointer;
      font-size: 26px;
      font-weight: 300;
    }

    .close-alert::after {
      position: absolute;
      top: 32px;
      right: 0;
      width: max-content;
      max-width: 150px;
      padding: 7px 8px;
      border-radius: 3px;
      background: #cfcfcf;
      color: #1f2329;
      content: "Закрыть\AЗажать ЛКМ - закрыть все";
      white-space: pre-line;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-3px);
      transition: opacity 0.12s ease, transform 0.12s ease;
      z-index: 120;
    }

    .close-alert:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    .alert-body { padding: 26px 24px 12px 50px; }

    .symbol-line {
      display: flex;
      align-items: baseline;
      gap: 12px;
      font-size: 21px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .symbol {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 125px;
      color: #ffffff;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.12);
    }

    .percent {
      color: var(--green);
      text-shadow: 0 0 24px rgba(36, 245, 160, 0.28);
      font-size: 21px;
      font-weight: 800;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-top: 12px;
      padding-top: 9px;
      border-top: 1px solid rgba(148, 163, 184, 0.18);
      color: rgba(225, 231, 239, 0.72);
      font-size: 14px;
    }

    .meta-time {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .meta-time::before {
      content: "◷";
      color: rgba(225, 231, 239, 0.72);
      font-size: 18px;
    }

    .meta-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      margin: 0 10px;
    }

    .alert-page {
      position: absolute;
      right: 14px;
      bottom: 10px;
      color: rgba(225, 231, 239, 0.48);
      font-size: 15px;
      font-weight: 600;
      pointer-events: none;
    }

    .copy-note {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: #111318;
      color: var(--text);
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 10;
    }

    .copy-note.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .link-panel {
      position: absolute;
      right: 22px;
      bottom: 22px;
      width: 250px;
      border: 1px solid rgba(42, 47, 56, 0.72);
      background: rgba(8, 10, 14, 0.88);
      color: #7d8795;
      z-index: 2;
    }

    .terminal-panel {
      position: absolute;
      right: 22px;
      bottom: 118px;
      min-width: 210px;
      border: 1px solid rgba(42, 47, 56, 0.72);
      background: rgba(8, 10, 14, 0.88);
      color: #7d8795;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 8px;
      font-size: 12px;
    }

    .terminal-switch {
      display: flex;
      gap: 5px;
    }

    .terminal-option {
      height: 24px;
      border: 1px solid rgba(42, 47, 56, 0.95);
      background: rgba(4, 7, 10, 0.86);
      color: #8e98a8;
      padding: 0 9px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .terminal-option:hover,
    .terminal-option.active {
      border-color: rgba(0, 255, 170, 0.7);
      background: rgba(0, 255, 170, 0.09);
      color: var(--green);
    }

    .link-panel.collapsed .link-grid { display: none; }

    .link-panel[hidden] { display: none; }

    .sound-picker {
      position: absolute;
      right: 22px;
      bottom: 70px;
      width: 170px;
      border: 1px solid rgba(42, 47, 56, 0.72);
      background: rgba(8, 10, 14, 0.88);
      color: #7d8795;
      z-index: 2;
    }

    .sound-picker.collapsed .sound-list { display: none; }

    .sound-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 32px;
      border: 0;
      background: transparent;
      color: #8a94a3;
      cursor: pointer;
      padding: 7px 9px;
      text-align: left;
      font-size: 12px;
    }

    .sound-current {
      color: var(--green);
      font-weight: 800;
    }

    .sound-list {
      display: grid;
      gap: 4px;
      padding: 0 9px 9px;
    }

    .sound-option {
      min-height: 26px;
      border: 1px solid #252b35;
      background: #0b0e13;
      color: #98a2b1;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      padding: 5px 8px;
    }

    .sound-option.active {
      border-color: rgba(36, 245, 160, 0.72);
      background: rgba(36, 245, 160, 0.13);
      color: var(--green);
      font-weight: 800;
    }

    .link-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 32px;
      border: 0;
      background: transparent;
      color: #8a94a3;
      cursor: pointer;
      padding: 7px 9px;
      text-align: left;
      font-size: 12px;
    }

    .link-current {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #b6beca;
      font-weight: 800;
    }

    .link-current-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--link-color);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px 8px;
      padding: 0 9px 9px;
    }

    .link-option {
      display: flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
      border: 1px solid transparent;
      background: transparent;
      color: #8f98a7;
      cursor: pointer;
      font-size: 12px;
      padding: 3px 4px;
      text-align: left;
    }

    .link-option.active {
      border-color: rgba(255, 255, 255, 0.58);
      background: rgba(255, 255, 255, 0.08);
    }

    .link-swatch {
      width: 11px;
      height: 11px;
      flex: 0 0 auto;
      border-radius: 3px;
      background: var(--link-color);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2), 0 0 14px color-mix(in srgb, var(--link-color) 32%, transparent);
    }

    .link-option:hover .link-swatch,
    .link-option.active .link-swatch {
      transform: scale(1.08);
    }

    .link-label {
      color: #6f7887;
      font-size: 11px;
      line-height: 1;
    }

    @media (max-width: 780px) {
      .app { grid-template-columns: 1fr; }
      .side { border-right: 0; border-bottom: 1px solid var(--line); }
      .alerts { left: 14px; right: 14px; width: auto; }
      .link-panel { left: 14px; right: 14px; width: auto; }
      .terminal-panel { left: 14px; right: 14px; bottom: 118px; }
      .sound-picker { left: 14px; right: 14px; bottom: 70px; width: auto; }
    }
  </style>
</head>

    const symbols = new Set(loadSymbols());
    const symbolThresholds = loadSymbolThresholds();
    const states = new Map();
    const lastPrices = new Map();
    const alertedMinutes = new Set();
    const alertStack = [];
    let sockets = [];
    let reconnectTimer = null;
    let pollTimer = null;
    let pollRunning = false;
    let streamSignature = "";
    let renderFrame = 0;
    let soundEnabled = true;
    let desktopAlertsEnabled = false;
    let desktopAlertsDisabledManually = false;
    let selectedSoundId = "sound1";
    let terminalMode = "tiger";
    let linkGroup = "A";
    let draggingSymbol = "";
    let dragReadySymbol = "";
    let openThresholdSymbol = "";
    let renderAfterDrag = false;
    let closeAllTimer = null;

    function loadSymbols() {
      try {
        const parsed = JSON.parse(localStorage.getItem(SYMBOLS_STORAGE) || "[]");
        return Array.isArray(parsed) ? parsed.filter((item) => typeof item === "string") : [];
      } catch {
        return [];
      }
    }

    function saveSymbols() {
      localStorage.setItem(SYMBOLS_STORAGE, JSON.stringify([...symbols]));
    }

    function loadSymbolThresholds() {
      try {
        const parsed = JSON.parse(localStorage.getItem(SYMBOL_THRESHOLDS_STORAGE) || "{}");
        if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return {};

        return Object.fromEntries(Object.entries(parsed)
          .map(([symbol, value]) => [normalizeSymbol(symbol), parsePercentValue(value, 0)])
          .filter(([symbol, value]) => symbol && value > 0));
      } catch {
        return {};
      }
    }

    function saveSymbolThresholds() {
      localStorage.setItem(SYMBOL_THRESHOLDS_STORAGE, JSON.stringify(symbolThresholds));
    }

    function loadSettings() {
      try {
        const parsed = JSON.parse(localStorage.getItem(SETTINGS_STORAGE) || "{}");
        if (Number.isFinite(Number(parsed.move))) {
          els.moveInput.value = String(parsed.move);
        }
        if (LINK_GROUPS.includes(String(parsed.linkGroup))) {
          linkGroup = String(parsed.linkGroup);
        }
        if (TERMINALS.includes(String(parsed.terminalMode))) {
          terminalMode = String(parsed.terminalMode);
        }
        if (typeof parsed.soundEnabled === "boolean") {
          soundEnabled = parsed.soundEnabled;
        }
        if (typeof parsed.desktopAlertsEnabled === "boolean") {
          desktopAlertsEnabled = parsed.desktopAlertsEnabled;
        }
        if (typeof parsed.desktopAlertsDisabledManually === "boolean") {
          desktopAlertsDisabledManually = parsed.desktopAlertsDisabledManually;
        }
        if (SOUND_OPTIONS.some((sound) => sound.id === parsed.selectedSoundId)) {
          selectedSoundId = parsed.selectedSoundId;
        }
      } catch {}
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_STORAGE, JSON.stringify({
        move: threshold(),
        terminalMode,
        linkGroup,
        soundEnabled,
        desktopAlertsEnabled,
        desktopAlertsDisabledManually,
        selectedSoundId
      }));
    }

    function threshold() {
      return parsePercentValue(els.moveInput.value, 1.5);
    }

    function thresholdFor(symbol) {
      return symbolThresholds[symbol] || threshold();
    }

    function parsePercentValue(value, fallback) {
      const parsed = Number(String(value).replace(",", "."));
      return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
    }

    function formatPercentInput(value) {
      return String(value).replace(".", ",");
    }

    function normalizeSymbol(raw) {
      const cleaned = raw.trim().toUpperCase().replace(/[^A-Z0-9]/g, "");
      if (!cleaned) return "";
      return cleaned.endsWith("USDT") ? cleaned : `${cleaned}USDT`;
    }

    function baseSymbol(symbol) {
      return symbol.endsWith("USDT") ? symbol.slice(0, -4) : symbol;
    }

    function minuteKey(time) {
      return Math.floor(time / 60000);
    }

    function formatClock(date) {
      return date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function setConnection(text, good) {
      els.connection.textContent = text;
      els.connection.style.color = good ? "#24f5a0" : "#f8c36a";
    }

    async function addSymbol() {
      const symbol = normalizeSymbol(els.symbolInput.value);
      if (!symbol) return;
      if (!symbols.has(symbol) && symbols.size >= MAX_SYMBOLS) {
        showNote("\u041b\u0438\u043c\u0438\u0442: 40 \u043c\u043e\u043d\u0435\u0442");
        return;
      }

      els.addButton.disabled = true;
      els.addButton.textContent = "...";
      const ok = await loadLatestCandle(symbol);
      els.addButton.disabled = false;
      els.addButton.textContent = "Добавить";

      if (!ok) {
        showNote(`${symbol} не отвечает`);
        return;
      }

      symbols.add(symbol);
      els.symbolInput.value = "";
      saveSymbols();
      renderWatchList();
      updateStreams();
    }

    function removeSymbol(symbol) {
      symbols.delete(symbol);
      delete symbolThresholds[symbol];
      if (openThresholdSymbol === symbol) openThresholdSymbol = "";
      states.delete(symbol);
      lastPrices.delete(symbol);
      for (const key of [...alertedMinutes]) {
        if (key.startsWith(`${symbol}:`)) alertedMinutes.delete(key);
      }
      saveSymbols();
      saveSymbolThresholds();
      renderWatchList();
      updateStreams();
    }

    function updateStreams() {
      const sorted = [...symbols].sort();
      const nextSignature = sorted.join("/");
      els.coinCount.textContent = sorted.length;

      if (nextSignature === streamSignature) return;
      streamSignature = nextSignature;
      stopStreams();

      if (!sorted.length) {
        setConnection("ожидание", false);
        stopPolling();
        return;
      }

      setConnection("подключаюсь", false);
      startStreams(sorted);
      startPolling();
    }

    function startStreams(sortedSymbols) {
      const streams = sortedSymbols.flatMap((symbol) => [
        `${symbol.toLowerCase()}@kline_1m`,
        `${symbol.toLowerCase()}@trade`,
        `${symbol.toLowerCase()}@aggTrade`,
        `${symbol.toLowerCase()}@bookTicker`
      ]);
      for (let index = 0; index < streams.length; index += STREAMS_PER_SOCKET) {
        const chunk = streams.slice(index, index + STREAMS_PER_SOCKET);
        let socket = null;

        try {
          socket = new WebSocket(`${BINANCE_COMBINED_STREAM}${chunk.join("/")}`);
        } catch {
          scheduleReconnect();
          continue;
        }

        sockets.push(socket);

        socket.addEventListener("open", () => {
          if (!sockets.includes(socket)) return;
          setConnection("Онлайн", true);
        });

        socket.addEventListener("message", (event) => {
          if (!sockets.includes(socket)) return;
          try {
            const parsed = JSON.parse(event.data);
            const data = parsed.data || parsed;
            if (data.e === "kline" && data.k) {
              processKline(data);
            } else if (data.e === "trade" || data.e === "aggTrade") {
              processTrade(data);
            } else if (data.e === "bookTicker") {
              processBookTicker(data);
            }
          } catch {
            // One malformed packet should not stop the watchlist.
          }
        });

        socket.addEventListener("close", () => {
          if (sockets.includes(socket) && symbols.size) scheduleReconnect();
        });

        socket.addEventListener("error", () => {
          if (!sockets.includes(socket)) return;
          try { socket.close(); } catch {}
          scheduleReconnect();
        });
      }
    }

    function stopStreams() {
      window.clearTimeout(reconnectTimer);
      reconnectTimer = null;
      const current = sockets;
      sockets = [];
      current.forEach((socket) => {
        try { socket.close(); } catch {}
      });
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = window.setTimeout(() => {
        reconnectTimer = null;
        const sorted = streamSignature ? streamSignature.split("/").filter(Boolean) : [];
        stopStreams();
        if (sorted.length) startStreams(sorted);
      }, 1200);
    }

    function processKline(data) {
      const kline = data.k;
      const symbol = data.s || kline.s;
      if (!symbols.has(symbol)) return;

      processCandle({
        symbol,
        open: kline.o,
        high: kline.h,
        close: kline.c,
        openTime: kline.t,
        source: "websocket"
      });
    }

    function processTrade(data) {
      const symbol = data.s;
      if (!symbols.has(symbol)) return;

      const price = Number(data.p);
      const tradeTime = Number(data.T || data.E || Date.now());
      processPriceTick(symbol, price, tradeTime);
    }

    function processBookTicker(data) {
      const symbol = data.s;
      if (!symbols.has(symbol)) return;

      const bid = Number(data.b);
      const ask = Number(data.a);
      const price = Math.max(bid, ask);
      const eventTime = Number(data.T || data.E || Date.now());
      processPriceTick(symbol, price, eventTime);
    }

    function processPriceTick(symbol, price, eventTime) {
      const key = minuteKey(eventTime);
      if (!Number.isFinite(price) || price <= 0) return;

      const previous = states.get(symbol);
      if (previous && previous.key > key) return;

      const sameMinute = previous && previous.key === key;
      const rememberedPrice = lastPrices.get(symbol);
      const baseOpen = sameMinute ? previous.open : previous?.close || rememberedPrice || price;
      const previousHigh = sameMinute ? previous.high : price;
      const minuteHigh = Math.max(previousHigh, price);
      const percent = Math.max(
        sameMinute ? previous.percent : 0,
        ((minuteHigh - baseOpen) / baseOpen) * 100,
        0
      );

      const state = {
        symbol,
        key,
        open: baseOpen,
        high: minuteHigh,
        close: price,
        percent,
        openLocked: sameMinute ? previous.openLocked : false,
        updatedAt: Date.now()
      };
      states.set(symbol, state);
      lastPrices.set(symbol, price);

      els.updated.textContent = formatClock(new Date());
      setConnection("Онлайн", true);

      if (percent >= thresholdFor(symbol)) {
        fireAlert(state);
      }

      scheduleRender();
    }

    function processCandle({ symbol, open, high, close, openTime, source }) {
      if (!symbols.has(symbol)) return;

      const openPrice = Number(open);
      const highPrice = Number(high);
      const closePrice = Number(close);
      const key = minuteKey(Number(openTime));
      if (!Number.isFinite(openPrice) || !Number.isFinite(highPrice) || !Number.isFinite(closePrice) || openPrice <= 0) return;

      const previous = states.get(symbol);
      if (previous && previous.key > key) return;

      const sameMinute = previous && previous.key === key;
      const baseOpen = sameMinute && previous.openLocked ? previous.open : openPrice;
      const previousHigh = previous && previous.key === key ? previous.high : 0;
      const minuteHigh = Math.max(previousHigh, highPrice, closePrice);
      const percent = Math.max(
        sameMinute && previous.openLocked ? previous.percent : 0,
        ((minuteHigh - baseOpen) / baseOpen) * 100,
        0
      );
      const state = {
        symbol,
        key,
        open: baseOpen,
        high: minuteHigh,
        close: closePrice,
        percent,
        openLocked: true,
        updatedAt: Date.now()
      };
      states.set(symbol, state);
      lastPrices.set(symbol, closePrice);

      els.updated.textContent = formatClock(new Date());
      setConnection("Онлайн", true);

      if (percent >= thresholdFor(symbol)) {
        fireAlert(state);
      }

      scheduleRender();
    }

    function startPolling() {
      stopPolling();
      pollSelectedSymbols();
      pollTimer = window.setInterval(pollSelectedSymbols, REST_POLL_MS);
    }

    function stopPolling() {
      window.clearInterval(pollTimer);
      pollTimer = null;
      pollRunning = false;
    }

    async function pollSelectedSymbols() {
      if (!symbols.size || pollRunning) return;
      pollRunning = true;

      const list = [...symbols];
      await Promise.allSettled(list.map((symbol) => loadLatestCandle(symbol)));
      pollRunning = false;
    }

    async function loadLatestCandle(symbol) {
      try {
        const response = await fetch(`${BINANCE_KLINES}?symbol=${encodeURIComponent(symbol)}&interval=1m&limit=1&_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return false;
        const rows = await response.json();
        const row = rows[0];
        if (!row) return false;

        processCandle({
          symbol,
          open: row[1],
          high: row[2],
          close: row[4],
          openTime: row[0],
          source: "rest"
        });
        return true;
      } catch {
        return false;
      }
    }

    function fireAlert(state) {
      const key = `${state.symbol}:${state.key}`;
      if (alertedMinutes.has(key)) return;
      alertedMinutes.add(key);
      addAlert(state.symbol, state.percent);
    }

    function scheduleRender() {
      if (draggingSymbol) {
        renderAfterDrag = true;
        return;
      }
      if (document.activeElement?.matches("[data-threshold-symbol]")) return;
      if (renderFrame) return;
      renderFrame = window.requestAnimationFrame(() => {
        renderFrame = 0;
        renderWatchList();

    function renderWatchList() {

        const panelOpen = openThresholdSymbol === symbol;
        const percentClass = percent >= coinThreshold ? "hot" : percent > 0 ? "" : "idle";
        const label = state ? `+${percent.toFixed(2)}%` : "-";
        return `
          <div class="coin" data-symbol="${symbol}">

              <div class="threshold-editor">
                <input class="coin-threshold" type="text" inputmode="decimal" data-threshold-symbol="${symbol}" value="${personalThreshold}" placeholder="${formatPercentInput(threshold())}" aria-label="Личный порог ${symbol}">
                <span class="threshold-unit">%</span>

    function reorderSymbol(source, target) {
      if (!source || !target || source === target || !symbols.has(source) || !symbols.has(target)) return;

      const ordered = [...symbols];
      const from = ordered.indexOf(source);
      const to = ordered.indexOf(target);
      if (from < 0 || to < 0) return;

      ordered.splice(from, 1);
      ordered.splice(to, 0, source);
      symbols.clear();
      ordered.forEach((symbol) => symbols.add(symbol));
      saveSymbols();
      renderWatchList();
    }

    function syncOrderFromDom() {
      const ordered = [...els.watchList.querySelectorAll(".coin[data-symbol]")]
        .map((row) => row.dataset.symbol)
        .filter((symbol) => symbols.has(symbol));
      if (!ordered.length) return;

      const missing = [...symbols].filter((symbol) => !ordered.includes(symbol));
      symbols.clear();
      [...ordered, ...missing].forEach((symbol) => symbols.add(symbol));
      saveSymbols();
    }

    function moveDragging(event) {
      if (!draggingSymbol) return;
      event.preventDefault();

      const rows = [...els.watchList.querySelectorAll(".coin[data-symbol]")];
      const dragged = rows.find((row) => row.dataset.symbol === draggingSymbol);
      if (!dragged) return;

      const targets = rows.filter((row) => row !== dragged);
      const before = targets.find((row) => {
        const box = row.getBoundingClientRect();
        return event.clientY < box.top + box.height / 2;
      });

      if (before) {
        els.watchList.insertBefore(dragged, before);
      } else {
        els.watchList.appendChild(dragged);
      }
    }

    function startDragging(event) {
      const handle = event.target.closest(".drag-handle");
      const row = event.target.closest(".coin[data-symbol]");
      if (!handle || !row) return;

      event.preventDefault();
      draggingSymbol = row.dataset.symbol;
      renderAfterDrag = false;
      row.classList.add("dragging");
      window.addEventListener("pointermove", moveDragging);
      window.addEventListener("pointerup", finishDragging, { once: true });
    }

    function finishDragging() {
      window.removeEventListener("pointermove", moveDragging);
      if (draggingSymbol) syncOrderFromDom();
      draggingSymbol = "";
      dragReadySymbol = "";
      els.watchList.querySelectorAll(".coin.dragging").forEach((row) => row.classList.remove("dragging"));
      if (renderAfterDrag) {
        renderAfterDrag = false;
        renderWatchList();
      }
    }

    function saveThresholdFromInput(input, render = false) {
      const symbol = input.dataset.thresholdSymbol;
      const value = parsePercentValue(input.value, 0);
      if (value > 0) {
        symbolThresholds[symbol] = value;
      } else {
        delete symbolThresholds[symbol];
      }

      saveSymbolThresholds();
      if (render) renderWatchList();
    }

    function commitOpenThresholdInput(render = false) {
      const input = els.watchList.querySelector("[data-threshold-symbol]:focus");
      if (input) saveThresholdFromInput(input, render);
    }

    async function copySymbol(symbol) {

      } catch {
        const input = document.createElement("input");

    function sendTigerSymbol(symbol, exchange) {
      return new Promise((resolve, reject) => {
        let settled = false;
        const socket = new WebSocket(TIGER_WS_URL);
        const timer = window.setTimeout(() => {
          if (settled) return;
          settled = true;
          try { socket.close(); } catch {}
          reject(new Error("Tiger timeout"));
        }, 1200);

        function finish(ok, error) {
          if (settled) return;
          settled = true;
          window.clearTimeout(timer);
          try { socket.close(); } catch {}
          ok ? resolve() : reject(error || new Error("Tiger error"));
        }

        socket.addEventListener("open", () => {
          socket.send(JSON.stringify({
            type: "setLinkSymbol",
            e: exchange,
            m: "FUTURES",
            symbol,
            linkGroup
          }));
        });

        socket.addEventListener("message", (event) => {
          try {
            const data = JSON.parse(event.data);
            const responseType = String(data?.response?.type || data?.type || "").toLowerCase();
            const hasError = responseType === "error" || data?.error || data?.response?.error;
            finish(!hasError, hasError ? new Error("Tiger rejected symbol") : null);
          } catch {
            finish(true);
          }
        });

        socket.addEventListener("error", () => finish(false));
        socket.addEventListener("close", () => {
          if (!settled) finish(false);
        });
      });
    }

    async function openSymbolInTiger(symbol) {
      try {
        await sendTigerSymbol(symbol, "BINANCE-FUT");
        showNote(`${symbol} открыт в Tiger`);
      } catch {
        try {
          await sendTigerSymbol(symbol, "BINANCE");
          showNote(`${symbol} открыт в Tiger`);
        } catch {
          await copySymbol(symbol);
          showNote("Tiger не ответил, тикер скопирован");
        }
      }
    }

    async function openSymbolInVataga(symbol) {
      const url = [
        VATAGA_API_BASE,
        encodeURIComponent(VATAGA_PARTNER_ID),
        encodeURIComponent(VATAGA_EXCHANGE),
        encodeURIComponent(VATAGA_MARKET_TYPE),
        encodeURIComponent(symbol)
      ].join("/");

      try {
        const response = await fetch(url, {
          method: "POST",
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`Vataga ${response.status}`);
        }

        showNote(`${symbol} sent to Vataga`);
      } catch {
        try {
          await fetch(url, {
            method: "POST",
            mode: "no-cors",
            cache: "no-store"
          });
          showNote(`${symbol} sent to Vataga`);
        } catch {
          await copySymbol(symbol);
          showNote("Vataga did not answer, symbol copied");
        }
      }
    }

    function openSymbolInTerminal(symbol) {
      if (terminalMode === "vataga") {
        return openSymbolInVataga(symbol);
      }

      return openSymbolInTiger(symbol);

    function addAlert(symbol, percent) {
      playAlertSound();
      showDesktopAlert(symbol, percent);

      const card = document.createElement("div");
      card.className = "alert";
      card.tabIndex = 0;
      card.setAttribute("role", "button");
      card.title = `Открыть ${symbol} в Tiger`;
      card.innerHTML = `
        <div class="alert-head">
          <span>LONG</span>
          <button class="close-alert" type="button" aria-label="Закрыть">×</button>
        </div>
        <div class="alert-body">
          <div class="symbol-line">
            <span class="symbol">${baseSymbol(symbol)}</span>
            <span class="percent">+${percent.toFixed(2)}%</span>
          </div>
          <div class="meta">
            <span class="meta-time">1m</span>
            <span class="meta-dot"></span>
            <span>Монета из списка</span>
          </div>
        </div>
        <span class="alert-page">1</span>
      `;

      const closeButton = card.querySelector(".close-alert");
      closeButton.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
        window.clearTimeout(closeAllTimer);
        closeAllTimer = window.setTimeout(() => {
          closeAllTimer = null;
          closeAllAlerts();
        }, 520);
      });
      closeButton.addEventListener("pointerup", (event) => {
        event.stopPropagation();
        window.clearTimeout(closeAllTimer);
        closeAllTimer = null;
      });
      closeButton.addEventListener("pointerleave", () => {
        window.clearTimeout(closeAllTimer);
        closeAllTimer = null;
      });
      closeButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if (closeAllTimer === null && !alertStack.includes(card)) return;
        window.clearTimeout(closeAllTimer);
        closeAllTimer = null;
        closeAlert(card);
      });

      card.addEventListener("click", () => openSymbolInTerminal(symbol));
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openSymbolInTerminal(symbol);
        }
      });
      alertStack.unshift(card);
      els.alerts.prepend(card);

      while (alertStack.length > MAX_ALERTS) {
        const removed = alertStack.pop();
        removed.remove();
      }

      renderAlertStack();
    }

    }

        : `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H3v6h3l5 4V5Z"></path><path d="m16 9 5 5"></path><path d="m21 9-5 5"></path></svg>`;

    function notificationPermission() {
      return "Notification" in window ? Notification.permission : "unsupported";
    }

    function syncDesktopAlertsWithBrowserPermission() {
      if (!("Notification" in window)) {
        desktopAlertsEnabled = false;
        return;
      }

      if (Notification.permission === "denied" && desktopAlertsEnabled) {
        desktopAlertsEnabled = false;
        saveSettings();
      }
    }

    function renderNotifyButton() {
      syncDesktopAlertsWithBrowserPermission();
      const granted = notificationPermission() === "granted";
      const active = desktopAlertsEnabled && granted;
      els.notifyButton.classList.toggle("on", active);
      els.notifyButton.setAttribute("aria-pressed", String(active));
      els.notifyButton.setAttribute("aria-label", active ? "Выключить уведомления Windows" : "Включить уведомления Windows");
      els.notifyButton.title = active ? "Выключить уведомления Windows" : "Включить уведомления Windows";
      els.notifyButton.innerHTML = active
        ? `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path><path d="m4 4 16 16"></path></svg>`;
    }

    async function toggleDesktopAlerts() {
      if (!("Notification" in window)) {
        desktopAlertsEnabled = false;
        renderNotifyButton();
        saveSettings();
        showNote("Уведомления не поддерживаются");
        return;
      }

      if (desktopAlertsEnabled && Notification.permission === "granted") {
        desktopAlertsEnabled = false;
        desktopAlertsDisabledManually = true;
        renderNotifyButton();
        saveSettings();
        showNote("Уведомления выключены");
        return;
      }

      if (Notification.permission === "granted") {
        desktopAlertsEnabled = true;
        desktopAlertsDisabledManually = false;
        renderNotifyButton();
        saveSettings();
        showNote("Уведомления включены");
        window.setTimeout(showDesktopTestAlert, 350);
        return;
      }

      let permission = Notification.permission;
      if (permission === "default") {
        permission = await Notification.requestPermission();
        await new Promise((resolve) => window.setTimeout(resolve, 350));
        if (Notification.permission === "granted") permission = "granted";
      }

      if (permission === "granted") {
        desktopAlertsEnabled = true;
        desktopAlertsDisabledManually = false;
        renderNotifyButton();
        saveSettings();
        showNote("Уведомления включены");
        window.setTimeout(showDesktopTestAlert, 350);
        return;
      }

      desktopAlertsEnabled = false;
      desktopAlertsDisabledManually = false;
      renderNotifyButton();
      saveSettings();
      showNote("Разреши уведомления в браузере");
    }

    function showDesktopTestAlert() {

        saveSettings();
        showNote("Звук включён");
      } catch {
        showNote("Нажми ещё раз для звука");
      }
    }

    function playAlertSound() {
      if (!soundEnabled) return;
      try {
        applySelectedSound();
        els.alertSound.currentTime = 0;
        const played = els.alertSound.play();
        if (played && typeof played.catch === "function") {
          played.catch(() => {});
        }
      } catch {}
    }

    function closeAlert(card) {
      const index = alertStack.indexOf(card);
      if (index >= 0) alertStack.splice(index, 1);
      card.remove();
      renderAlertStack();
    }

    function closeAllAlerts() {
      window.clearTimeout(closeAllTimer);
      closeAllTimer = null;
      while (alertStack.length) {
        const card = alertStack.pop();
        card.remove();
      }
      renderAlertStack();
    }

    function renderAlertStack() {
      els.alertCount.textContent = alertStack.length;
      alertStack.forEach((card, index) => {
        const visible = index < 4;
        const offset = Math.min(index, 3) * 7;
        const scale = 1 - Math.min(index, 3) * 0.025;
        const page = card.querySelector(".alert-page");
        if (page) page.textContent = String(alertStack.length);
        card.style.zIndex = String(100 - index);
        card.style.opacity = visible ? String(1 - Math.min(index, 3) * 0.18) : "0";
        card.style.pointerEvents = index === 0 ? "auto" : "none";
        card.style.transform = `translate(${offset}px, ${offset}px) scale(${scale})`;
      });
    }

    els.addButton.addEventListener("click", addSymbol);
    els.notifyButton.addEventListener("click", toggleDesktopAlerts);
    els.soundButton.addEventListener("click", toggleSound);
    els.symbolInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addSymbol();
    });
    els.moveInput.addEventListener("input", () => {
      saveSettings();
      renderWatchList();
    });
    els.watchList.addEventListener("pointerdown", (event) => {
      const target = event.target.closest("[data-open-symbol]");
      if (!target) return;
      event.preventDefault();
      event.stopPropagation();
      openSymbolInTerminal(target.dataset.openSymbol);
    }, true);
    els.watchList.addEventListener("pointerdown", (event) => {
      const button = event.target.closest("[data-threshold-toggle]");
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      commitOpenThresholdInput(false);
      openThresholdSymbol = openThresholdSymbol === button.dataset.thresholdToggle ? "" : button.dataset.thresholdToggle;
      renderWatchList();
      if (openThresholdSymbol) {
        requestAnimationFrame(() => {
          els.watchList.querySelector(`[data-threshold-symbol="${openThresholdSymbol}"]`)?.focus();
        });
      }
    }, true);
    els.watchList.addEventListener("pointerdown", (event) => {
      const panel = event.target.closest("[data-threshold-panel]");
      if (!panel) return;
      event.stopPropagation();
    }, true);
    els.watchList.addEventListener("pointerdown", (event) => {
      const button = event.target.closest("[data-remove]");
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      removeSymbol(button.dataset.remove);
    }, true);
    els.watchList.addEventListener("change", (event) => {
      const input = event.target.closest("[data-threshold-symbol]");
      if (!input) return;
      saveThresholdFromInput(input, false);
    });
    els.watchList.addEventListener("input", (event) => {
      const input = event.target.closest("[data-threshold-symbol]");
      if (!input) return;
      saveThresholdFromInput(input, false);
    });
    els.watchList.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      const input = event.target.closest("[data-threshold-symbol]");
      if (input) {
        saveThresholdFromInput(input, false);
        openThresholdSymbol = "";
        input.blur();
        renderWatchList();
      }
    });
    els.watchList.addEventListener("focusout", (event) => {
      const input = event.target.closest("[data-threshold-symbol]");
      if (!input) return;
      saveThresholdFromInput(input, false);
    });
    els.watchList.addEventListener("pointerdown", startDragging);
    els.linkToggle.addEventListener("click", () => {
      els.linkPanel.classList.toggle("collapsed");
    });
    els.linkGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-link-group]");
      if (!button) return;
      setLinkGroup(button.dataset.linkGroup);
      els.linkPanel.classList.add("collapsed");
    });
    els.terminalButtons.forEach((button) => {
      button.addEventListener("click", () => setTerminalMode(button.dataset.terminalMode));
    });
    els.soundPickerToggle.addEventListener("click", () => {
      els.soundPicker.classList.toggle("collapsed");
    });
    window.addEventListener("focus", renderNotifyButton);
    document.addEventListener("visibilitychange", renderNotifyButton);

    if (navigator.permissions?.query) {
      navigator.permissions.query({ name: "notifications" }).then((status) => {
        status.onchange = renderNotifyButton;
      }).catch(() => {});
    }

    loadSettings();
    applySelectedSound();
    renderSoundButton();
    renderNotifyButton();
    renderSoundList();
    renderLinkPanel();
    renderTerminalPanel();
    renderWatchList();
    updateStreams();
  </script>
</body>
</html>
