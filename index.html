<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Binance Impulse Alerts</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050608;
      --panel: #0b0d11;
      --line: #2a2f38;
      --text: #f4f6f8;
      --muted: #9ca3af;
      --green: #00c46a;
      --yellow: #f0b90b;
      --toast: #cfcfcf;
      --toast-text: #111318;
      --red: #e05252;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", Arial, sans-serif; }
    button, input { font: inherit; }

    .app { display: grid; grid-template-columns: minmax(285px, 380px) minmax(0, 1fr); min-height: 100vh; }
    .side { padding: 20px; border-right: 1px solid var(--line); background: var(--panel); }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .logo { display: grid; place-items: center; width: 40px; height: 40px; border: 1px solid rgba(240,185,11,.4); background: rgba(240,185,11,.11); color: var(--yellow); font-weight: 800; }
    h1, h2 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 20px; line-height: 1.1; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }

    .controls { display: grid; gap: 13px; margin-bottom: 18px; }
    .field { display: grid; gap: 7px; }
    label { color: #c8ced8; font-size: 13px; }
    .input-row { display: grid; grid-template-columns: 1fr auto; align-items: center; border: 1px solid var(--line); background: #07090c; }
    input { width: 100%; min-width: 0; border: 0; outline: 0; padding: 10px 11px; background: transparent; color: var(--text); }
    .suffix { padding-right: 11px; color: var(--muted); font-size: 13px; }
    .check-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }
    .check-row input { border: 1px solid var(--line); background: #07090c; }
    .check-row button { border: 1px solid rgba(240,185,11,.44); background: rgba(240,185,11,.11); color: #f8d36a; cursor: pointer; padding: 0 10px; }

    .status, .movers { padding-top: 16px; border-top: 1px solid var(--line); }
    .status { display: grid; gap: 9px; }
    .status-line { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 13px; }
    .status-line strong { color: var(--text); text-align: right; }
    .movers { margin-top: 18px; }
    .movers-title { margin-bottom: 8px; color: #c8ced8; font-size: 13px; }
    .mover { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; min-height: 32px; padding: 0 9px; border: 1px solid #252b35; background: #080a0e; color: #d8dde6; font-size: 13px; }
    .mover + .mover { border-top: 0; }
    .mover span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mover strong { color: #9ff1c6; }

    .main { min-width: 0; }
    .stage { position: relative; min-height: 100vh; overflow: hidden; }
    .empty { display: grid; place-items: center; min-height: 100vh; padding: 24px; color: #535b68; text-align: center; }
    .alerts { position: absolute; top: 22px; right: 22px; width: min(360px, calc(100vw - 44px)); height: 154px; z-index: 3; }
    .alert { position: absolute; inset: 0; min-height: 126px; border: 1px solid #0b0b0c; border-left: 4px solid var(--green); background: var(--toast); color: var(--toast-text); box-shadow: 0 14px 34px rgba(0,0,0,.38); cursor: pointer; transition: transform .16s ease, opacity .16s ease, filter .16s ease; text-align: left; }
    .alert:hover { filter: brightness(1.04); }
    .alert-head { display: flex; justify-content: space-between; gap: 12px; padding: 10px 10px 0 11px; font-size: 18px; }
    .icons { display: inline-flex; gap: 8px; }
    .chart-alert, .mute-icon, .close-alert { display: inline-grid; place-items: center; width: 22px; height: 22px; border: 0; background: transparent; color: #2a2d33; line-height: 1; cursor: pointer; }
    .chart-alert { font-size: 16px; font-weight: 700; }
    .mute-icon, .close-alert { font-size: 20px; }
    .alert-body { padding: 32px 10px 9px 11px; }
    .symbol-line { display: flex; align-items: baseline; gap: 12px; font-size: 24px; line-height: 1; }
    .symbol { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 175px; }
    .meta { display: flex; justify-content: space-between; gap: 10px; margin-top: 7px; color: #202329; font-size: 14px; }

    .copy-note { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none; padding: 10px 14px; border: 1px solid rgba(255,255,255,.16); background: #111318; color: var(--text); transition: opacity .18s ease, transform .18s ease; z-index: 10; }
    .copy-note.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .chart-pop { position: fixed; right: 22px; bottom: 22px; width: min(760px, calc(100vw - 44px)); height: 460px; min-width: 320px; min-height: 240px; border: 1px solid var(--line); background: #080a0e; box-shadow: 0 18px 40px rgba(0,0,0,.42); z-index: 8; overflow: hidden; display: flex; flex-direction: column; }
    .chart-pop[hidden] { display: none; }
    .chart-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 10px 12px; border-bottom: 1px solid var(--line); color: #dce2eb; font-size: 14px; font-weight: 700; user-select: none; }
    .chart-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chart-tools { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .timeframes { display: flex; gap: 2px; padding: 2px; border: 1px solid var(--line); background: #0e1117; }
    .tf-button { min-width: 32px; height: 24px; border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 700; }
    .tf-button.active { background: #193325; color: #9ff1c6; }
    .chart-close { display: grid; place-items: center; width: 24px; height: 24px; border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; }
    .chart-body { flex: 1; min-height: 0; }
    .chart-pane { position: relative; width: 100%; height: 100%; min-width: 0; }
    .chart-canvas { display: block; width: 100%; height: 100%; background: #050608; cursor: grab; touch-action: none; }
    .chart-canvas.dragging { cursor: grabbing; }
    .chart-scale { position: absolute; z-index: 2; background: transparent; touch-action: none; }
    .chart-scale.price { top: 0; bottom: 0; right: 0; width: 54px; cursor: ns-resize; }
    .chart-scale.time { left: 0; right: 54px; bottom: 0; height: 28px; cursor: ew-resize; }

    @media (max-width: 780px) {
      .app { grid-template-columns: 1fr; }
      .side { border-right: 0; border-bottom: 1px solid var(--line); }
      .alerts { left: 14px; right: 14px; width: auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="side">
      <div class="brand"><div class="logo">B</div><div><h1>Impulse Alerts</h1><div class="sub">Binance Futures</div></div></div>
      <section class="controls">
        <div class="field"><label for="moveInput">Импульс в лонг</label><div class="input-row"><input id="moveInput" type="number" min="0.1" step="0.1" value="1.5"><span class="suffix">%</span></div></div>
        <div class="field"><label for="volumeInput">Минимальный объём за 24 часа</label><div class="input-row"><input id="volumeInput" type="number" min="0" step="100000" value="1000000"><span class="suffix">USDT</span></div></div>
        <div class="field"><label for="symbolCheckInput">Проверить монету</label><div class="check-row"><input id="symbolCheckInput" type="text" placeholder="NFP"><button id="symbolCheckButton" type="button">Проверить</button></div></div>
      </section>
      <section class="status">
        <div class="status-line"><span>Подключение</span><strong id="connection">ожидание</strong></div>
        <div class="status-line"><span>Прошли объём</span><strong id="qualified">0</strong></div>
        <div class="status-line"><span>Ценовой поток</span><strong id="streamStatus">ожидание</strong></div>
        <div class="status-line"><span>Сообщений</span><strong id="messageCount">0</strong></div>
        <div class="status-line"><span>Лучший импульс</span><strong id="bestMove">0%</strong></div>
        <div class="status-line"><span>Последний тикер</span><strong id="lastTicker">-</strong></div>
        <div class="status-line"><span>Алертов</span><strong id="alertCount">0</strong></div>
        <div class="status-line"><span>Последнее обновление</span><strong id="updated">-</strong></div>
      </section>
      <section class="movers"><div class="movers-title">Ближайшие движения</div><div id="moversList"><div class="mover"><span>Жду данные</span><strong>-</strong></div></div></section>
    </aside>
    <section class="main"><section class="stage"><div class="empty"></div><div class="alerts" id="alerts"></div></section></section>
  </main>
  <div class="copy-note" id="copyNote">Скопировано</div>
  <section class="chart-pop" id="chartPop" hidden>
    <div class="chart-head"><span class="chart-title" id="chartTitle">-</span><div class="chart-tools"><div class="timeframes" id="timeframes"><button class="tf-button active" type="button" data-timeframe="1m">1m</button><button class="tf-button" type="button" data-timeframe="5m">5m</button><button class="tf-button" type="button" data-timeframe="15m">15m</button><button class="tf-button" type="button" data-timeframe="1h">1h</button></div><button class="chart-close" id="chartClose" type="button">×</button></div></div>
    <div class="chart-body"><div class="chart-pane"><canvas class="chart-canvas" id="chartCanvas"></canvas><div class="chart-scale price" id="chartPriceScale"></div><div class="chart-scale time" id="chartTimeScale"></div></div></div>
  </section>

  <script>
    const BINANCE_TICKERS = "https://fapi.binance.com/fapi/v1/ticker/24hr";
    const BINANCE_TICKER_STREAM = "wss://fstream.binance.com/ws/!ticker@arr";
    const BINANCE_COMBINED_STREAM = "wss://fstream.binance.com/stream?streams=";
    const POLL_MS = 2000;
    const MAX_ALERTS = 8;
    const MIN_VISIBLE_MOVE = 1;
    const TRIGGER_TOLERANCE = 0.03;
    const KLINE_STREAM_LIMIT = 950;
    const KLINE_STREAMS_PER_SOCKET = 160;
    const WATCH_MS = 60000;
    const SUPPORT_MIN_NOTIONAL = 20000;
    const SUPPORT_EAT_MS = 3000;
    const SUPPORT_EAT_RATIO = 0.7;
    const SUPPORT_DISTANCE_PERCENT = 0.5;
    const DOM_STREAMS_PER_SOCKET = 60;

    const $ = (id) => document.getElementById(id);
    const els = {
      alerts: $("alerts"), connection: $("connection"), qualified: $("qualified"), streamStatus: $("streamStatus"), messageCount: $("messageCount"), bestMove: $("bestMove"), lastTicker: $("lastTicker"), alertCount: $("alertCount"), updated: $("updated"), moversList: $("moversList"), moveInput: $("moveInput"), volumeInput: $("volumeInput"), symbolCheckInput: $("symbolCheckInput"), symbolCheckButton: $("symbolCheckButton"), copyNote: $("copyNote"), chartPop: $("chartPop"), chartTitle: $("chartTitle"), chartClose: $("chartClose"), chartCanvas: $("chartCanvas"), chartPriceScale: $("chartPriceScale"), chartTimeScale: $("chartTimeScale"), timeframes: $("timeframes"), timeframeButtons: [...document.querySelectorAll(".tf-button")]
    };

    const minuteMoves = new Map();
    const watchedSymbols = new Map();
    const supportCandidates = new Map();
    const alertedInitiations = new Set();
    const alertStack = [];
    let qualifiedSymbols = new Set();
    let pollTimer = null;
    let streamSocket = null;
    let streamReconnectTimer = null;
    let streamHealthTimer = null;
    let klineSockets = [];
    let klineSignature = "";
    let klineReconnectTimer = null;
    let domSockets = [];
    let domSignature = "";
    let domReconnectTimer = null;
    let requestRunning = false;
    let messageCount = 0;
    let alertCounter = 0;
    let moversFrame = 0;
    let activeChartSymbol = null;
    let activeTimeframe = "1m";
    let lastChartCandles = [];
    const chartView = { candleWidth: 6, offsetFromRight: 0, priceZoom: 1, pricePan: 0 };

    function settings() {
      return { move: Number(els.moveInput.value) || 1.5, minVolume: Number(els.volumeInput.value) || 1000000 };
    }

    function formatClock(date) { return date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }
    function compactNumber(value) { return new Intl.NumberFormat("ru-RU", { notation: "compact", maximumFractionDigits: 1 }).format(value); }
    function normalizeSymbol(symbol) { return symbol.endsWith("USDT") ? symbol.slice(0, -4) : symbol; }
    function minuteKey(time) { return Math.floor(time / 60000); }
    function impulseReached(percent) { return percent + TRIGGER_TOLERANCE >= settings().move; }
    function setConnection(text, good) { els.connection.textContent = text; els.connection.style.color = good ? "#9ff1c6" : "#f8c36a"; }

    async function pollBinance() {
      if (requestRunning) return;
      requestRunning = true;
      try {
        const response = await fetch(`${BINANCE_TICKERS}?_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error("ticker request failed");
        const tickers = await response.json();
        messageCount += 1;
        els.messageCount.textContent = messageCount;
        if (!streamSocket || streamSocket.readyState !== WebSocket.OPEN) els.streamStatus.textContent = "polling";
        setConnection("online", true);
        els.updated.textContent = formatClock(new Date());
        processTickers(tickers, { fullSnapshot: true });
        renderMovers();
      } catch {
        if (!streamSocket || streamSocket.readyState !== WebSocket.OPEN) {
          els.streamStatus.textContent = "ошибка";
          setConnection("нет данных", false);
        }
      } finally {
        requestRunning = false;
      }
    }

    function processTickers(tickers, { fullSnapshot = false } = {}) {
      const minVolume = settings().minVolume;
      const nextQualified = fullSnapshot ? new Set() : null;
      let qualifiedCount = 0;
      let lastSymbol = "-";
      tickers.forEach((ticker) => {
        const symbol = ticker.symbol || ticker.s;
        const price = Number(ticker.lastPrice ?? ticker.c);
        const volume = Number(ticker.quoteVolume ?? ticker.q);
        if (!symbol?.endsWith("USDT") || !Number.isFinite(price) || price <= 0 || !Number.isFinite(volume)) return;
        if (volume < minVolume) {
          minuteMoves.delete(symbol);
          return;
        }
        if (nextQualified) nextQualified.add(symbol);
        qualifiedCount += 1;
        lastSymbol = symbol;
        processPrice({ symbol, price, volume });
      });
      if (fullSnapshot) {
        qualifiedSymbols = nextQualified;
        els.qualified.textContent = qualifiedCount;
        updateKlineStreams();
      }
      if (lastSymbol !== "-") els.lastTicker.textContent = lastSymbol;
      clearOldState();
    }

    function processPrice({ symbol, price, volume }) {
      const now = Date.now();
      const key = minuteKey(now);
      const state = minuteMoves.get(symbol);
      if (!state || state.key !== key) {
        const next = { symbol, key, open: price, high: price, last: price, volume, percent: 0, updatedAt: now };
        minuteMoves.set(symbol, next);
        return;
      }
      state.high = Math.max(state.high, price);
      state.last = price;
      state.volume = volume;
      state.percent = Math.max(0, (state.high - state.open) / state.open * 100);
      state.updatedAt = now;
      maybeStartWatching(state);
      scheduleMoversRender();
    }

    function processKline(kline) {
      const symbol = kline.s;
      if (!qualifiedSymbols.has(symbol)) return;
      const open = Number(kline.k?.o);
      const high = Number(kline.k?.h);
      const close = Number(kline.k?.c);
      const volumeState = minuteMoves.get(symbol)?.volume || 0;
      if (!Number.isFinite(open) || !Number.isFinite(high) || !Number.isFinite(close) || open <= 0) return;
      const now = Date.now();
      const state = { symbol, key: minuteKey(Number(kline.k.t) || now), open, high, last: close, volume: volumeState, percent: Math.max(0, (high - open) / open * 100), updatedAt: now };
      minuteMoves.set(symbol, state);
      els.lastTicker.textContent = symbol;
      maybeStartWatching(state);
      scheduleMoversRender();
    }

    function maybeStartWatching(state) {
      if (!impulseReached(state.percent)) return;
      const now = Date.now();
      if ((watchedSymbols.get(state.symbol) || 0) > now) return;
      watchedSymbols.set(state.symbol, now + WATCH_MS);
      supportCandidates.set(state.symbol, new Map());
      updateDomStreams();
    }

    function startTickerStream() {
      stopTickerStream();
      try {
        streamSocket = new WebSocket(BINANCE_TICKER_STREAM);
        streamSocket.addEventListener("open", () => { els.streamStatus.textContent = "websocket"; setConnection("online", true); });
        streamSocket.addEventListener("message", (event) => {
          const data = JSON.parse(event.data);
          if (Array.isArray(data)) {
            messageCount += 1;
            els.messageCount.textContent = messageCount;
            els.updated.textContent = formatClock(new Date());
            processTickers(data);
          }
        });
        streamSocket.addEventListener("close", scheduleStreamReconnect);
        streamSocket.addEventListener("error", scheduleStreamReconnect);
      } catch { scheduleStreamReconnect(); }
    }

    function stopTickerStream() {
      window.clearTimeout(streamReconnectTimer);
      streamReconnectTimer = null;
      if (streamSocket) streamSocket.close();
      streamSocket = null;
    }

    function scheduleStreamReconnect() {
      if (streamReconnectTimer) return;
      streamReconnectTimer = window.setTimeout(() => { streamReconnectTimer = null; startTickerStream(); }, 1500);
    }

    function updateKlineStreams() {
      const symbols = [...qualifiedSymbols].sort().slice(0, KLINE_STREAM_LIMIT);
      const signature = symbols.join(",");
      if (signature === klineSignature) return;
      klineSignature = signature;
      startKlineStreams(symbols);
    }

    function startKlineStreams(symbols) {
      stopKlineStreams();
      if (!symbols.length) return;
      const chunks = chunk(symbols, KLINE_STREAMS_PER_SOCKET);
      klineSockets = chunks.map((items) => {
        const url = BINANCE_COMBINED_STREAM + items.map((symbol) => `${symbol.toLowerCase()}@kline_1m`).join("/");
        const socket = new WebSocket(url);
        socket.addEventListener("message", (event) => {
          const payload = JSON.parse(event.data);
          const data = payload.data || payload;
          if (data.e === "kline") processKline(data);
        });
        socket.addEventListener("close", scheduleKlineReconnect);
        socket.addEventListener("error", scheduleKlineReconnect);
        return socket;
      });
    }

    function stopKlineStreams() {
      window.clearTimeout(klineReconnectTimer);
      klineReconnectTimer = null;
      klineSockets.forEach((socket) => socket.close());
      klineSockets = [];
    }

    function scheduleKlineReconnect() {
      if (klineReconnectTimer) return;
      klineReconnectTimer = window.setTimeout(() => {
        klineReconnectTimer = null;
        startKlineStreams(klineSignature ? klineSignature.split(",").filter(Boolean) : []);
      }, 1500);
    }

    function updateDomStreams() {
      const now = Date.now();
      for (const [symbol, until] of watchedSymbols) {
        if (until <= now) {
          watchedSymbols.delete(symbol);
          supportCandidates.delete(symbol);
        }
      }
      const symbols = [...watchedSymbols.keys()].sort();
      const signature = symbols.join(",");
      if (signature === domSignature) return;
      domSignature = signature;
      startDomStreams(symbols);
    }

    function startDomStreams(symbols) {
      stopDomStreams();
      if (!symbols.length) return;
      const streams = symbols.flatMap((symbol) => [`${symbol.toLowerCase()}@depth20@100ms`, `${symbol.toLowerCase()}@aggTrade`]);
      domSockets = chunk(streams, DOM_STREAMS_PER_SOCKET).map((items) => {
        const socket = new WebSocket(BINANCE_COMBINED_STREAM + items.join("/"));
        socket.addEventListener("message", (event) => {
          const payload = JSON.parse(event.data);
          const data = payload.data || payload;
          const stream = payload.stream || "";
          if (data.e === "aggTrade") processAggTrade(data);
          else processDepth(data, stream);
        });
        socket.addEventListener("close", scheduleDomReconnect);
        socket.addEventListener("error", scheduleDomReconnect);
        return socket;
      });
    }

    function stopDomStreams() {
      window.clearTimeout(domReconnectTimer);
      domReconnectTimer = null;
      domSockets.forEach((socket) => socket.close());
      domSockets = [];
    }

    function scheduleDomReconnect() {
      if (domReconnectTimer) return;
      domReconnectTimer = window.setTimeout(() => { domReconnectTimer = null; startDomStreams(domSignature ? domSignature.split(",").filter(Boolean) : []); }, 1200);
    }

    function processDepth(data, streamName = "") {
      const symbol = data.s || streamName.split("@")[0]?.toUpperCase();
      if (!symbol || !isWatching(symbol)) return;
      const bids = data.b || data.bids || [];
      const asks = data.a || data.asks || [];
      const bestAsk = Number(asks[0]?.[0]);
      if (!Number.isFinite(bestAsk) || !bids.length) return;
      const state = minuteMoves.get(symbol);
      const candidates = supportCandidates.get(symbol) || new Map();
      supportCandidates.set(symbol, candidates);
      const now = Date.now();
      const seen = new Set();
      const maxDistance = SUPPORT_DISTANCE_PERCENT / 100;

      bids.forEach(([priceRaw, qtyRaw]) => {
        const price = Number(priceRaw);
        const qty = Number(qtyRaw);
        if (!Number.isFinite(price) || !Number.isFinite(qty) || price <= 0 || qty < 0) return;
        const distance = (bestAsk - price) / bestAsk;
        if (distance < 0 || distance > maxDistance) return;
        const notional = price * qty;
        const key = price.toPrecision(12);
        seen.add(key);
        if (notional >= SUPPORT_MIN_NOTIONAL && !candidates.has(key)) {
          candidates.set(key, { symbol, price, initialNotional: notional, currentNotional: notional, sellNotional: 0, startedAt: now, impulse: state?.percent || 0, volume: state?.volume || 0 });
        } else if (candidates.has(key)) {
          candidates.get(key).currentNotional = notional;
        }
      });

      for (const [key, candidate] of candidates) {
        if (!seen.has(key)) candidate.currentNotional = 0;
        const age = now - candidate.startedAt;
        const eaten = Math.max(0, candidate.initialNotional - candidate.currentNotional);
        const enoughEaten = eaten >= candidate.initialNotional * SUPPORT_EAT_RATIO;
        const tradeConfirmed = candidate.sellNotional >= Math.min(candidate.initialNotional * 0.35, SUPPORT_MIN_NOTIONAL);
        if (age <= SUPPORT_EAT_MS && enoughEaten && tradeConfirmed) {
          fireInitiationAlert(candidate, age);
          candidates.delete(key);
          watchedSymbols.delete(symbol);
          updateDomStreams();
        } else if (age > SUPPORT_EAT_MS) {
          candidates.delete(key);
        }
      }
    }

    function processAggTrade(trade) {
      const symbol = trade.s;
      if (!symbol || !isWatching(symbol)) return;
      const isSellIntoBid = trade.m === true;
      if (!isSellIntoBid) return;
      const price = Number(trade.p);
      const qty = Number(trade.q);
      if (!Number.isFinite(price) || !Number.isFinite(qty)) return;
      const notional = price * qty;
      const candidates = supportCandidates.get(symbol);
      if (!candidates) return;
      for (const [key, candidate] of candidates) {
        if (Math.abs(price - candidate.price) / candidate.price <= 0.0012) {
          candidate.sellNotional += notional;
          const age = Date.now() - candidate.startedAt;
          const eaten = Math.max(0, candidate.initialNotional - candidate.currentNotional);
          const enoughEaten = eaten >= candidate.initialNotional * SUPPORT_EAT_RATIO;
          const tradeConfirmed = candidate.sellNotional >= Math.min(candidate.initialNotional * 0.35, SUPPORT_MIN_NOTIONAL);
          if (age <= SUPPORT_EAT_MS && enoughEaten && tradeConfirmed) {
            fireInitiationAlert(candidate, age);
            candidates.delete(key);
            watchedSymbols.delete(symbol);
            updateDomStreams();
            break;
          }
        }
      }
    }

    function isWatching(symbol) {
      const until = watchedSymbols.get(symbol);
      if (!until) return false;
      if (until <= Date.now()) {
        watchedSymbols.delete(symbol);
        supportCandidates.delete(symbol);
        updateDomStreams();
        return false;
      }
      return true;
    }

    function fireInitiationAlert(candidate, eatenMs) {
      const key = `${candidate.symbol}:${minuteKey(Date.now())}`;
      if (alertedInitiations.has(key)) return;
      alertedInitiations.add(key);
      addAlert({ symbol: candidate.symbol, percent: candidate.impulse, volume: candidate.volume, title: "INIT LONG", detail: `bid ${compactNumber(candidate.initialNotional)} eaten ${(eatenMs / 1000).toFixed(1)}s` });
    }

    function clearOldState() {
      const current = minuteKey(Date.now());
      for (const [symbol, state] of minuteMoves) if (state.key < current - 1) minuteMoves.delete(symbol);
      for (const key of alertedInitiations) {
        const [, alertMinute] = key.split(":");
        if (Number(alertMinute) < current - 1) alertedInitiations.delete(key);
      }
      updateDomStreams();
    }

    function scheduleMoversRender() {
      if (moversFrame) return;
      moversFrame = window.requestAnimationFrame(() => { moversFrame = 0; renderMovers(); });
    }

    function renderMovers() {
      const now = Date.now();
      const rows = [...minuteMoves.values()].filter((item) => now - item.updatedAt < 75000 && item.percent >= MIN_VISIBLE_MOVE).sort((a, b) => b.percent - a.percent).slice(0, 8);
      if (!rows.length) {
        els.bestMove.textContent = "0%";
        els.moversList.innerHTML = `<div class="mover"><span>Жду данные</span><strong>-</strong></div>`;
        return;
      }
      els.bestMove.textContent = `${rows[0].percent.toFixed(2)}%`;
      els.moversList.innerHTML = rows.map((item) => `<div class="mover"><span>${item.symbol}</span><strong>+${item.percent.toFixed(2)}%</strong></div>`).join("");
    }

    async function copySymbol(symbol) {
      try { await navigator.clipboard.writeText(symbol); }
      catch {
        const input = document.createElement("input");
        input.value = symbol;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
      }
      els.copyNote.textContent = `${symbol} скопирован`;
      els.copyNote.classList.add("show");
      window.setTimeout(() => els.copyNote.classList.remove("show"), 1100);
    }

    function addAlert({ symbol, percent, volume, title = "INIT LONG", detail = "" }) {
      alertCounter += 1;
      els.alertCount.textContent = alertCounter;
      const cardKey = `${symbol}:${Date.now()}:${alertCounter}`;
      const card = document.createElement("button");
      card.className = "alert";
      card.type = "button";
      card.dataset.alertKey = cardKey;
      card.title = `Скопировать ${symbol}`;
      card.innerHTML = `<div class="alert-head"><span>${title}</span><span class="icons"><span class="chart-alert" role="button" tabindex="0" aria-label="Открыть график">↗</span><span class="mute-icon" aria-hidden="true">⌁</span><span class="close-alert" role="button" tabindex="0" aria-label="Закрыть">×</span></span></div><div class="alert-body"><div class="symbol-line"><span class="symbol">${normalizeSymbol(symbol)}</span><span class="percent">+${Number(percent || 0).toFixed(2)}%</span></div><div class="meta"><span>${detail || "Binance Фьючерсы"}</span><span>${compactNumber(volume || 0)}</span></div></div>`;
      const closeButton = card.querySelector(".close-alert");
      const chartButton = card.querySelector(".chart-alert");
      let holdTimer = null;
      function closeOne() {
        const index = alertStack.indexOf(card);
        if (index >= 0) alertStack.splice(index, 1);
        card.remove();
        renderAlertStack();
      }
      function closeAll() {
        while (alertStack.length) alertStack.pop().remove();
        renderAlertStack();
      }
      closeButton.addEventListener("pointerdown", (event) => { event.stopPropagation(); holdTimer = window.setTimeout(closeAll, 650); });
      closeButton.addEventListener("pointerup", () => window.clearTimeout(holdTimer));
      closeButton.addEventListener("pointerleave", () => window.clearTimeout(holdTimer));
      closeButton.addEventListener("click", (event) => { event.stopPropagation(); window.clearTimeout(holdTimer); closeOne(); });
      chartButton.addEventListener("click", (event) => { event.stopPropagation(); openChart(symbol); });
      card.addEventListener("click", () => copySymbol(symbol));
      alertStack.unshift(card);
      els.alerts.prepend(card);
      while (alertStack.length > MAX_ALERTS) alertStack.pop().remove();
      renderAlertStack();
    }

    function renderAlertStack() {
      alertStack.forEach((card, index) => {
        const visible = index < 4;
        const offset = Math.min(index, 3) * 7;
        const scale = 1 - Math.min(index, 3) * 0.025;
        card.style.zIndex = String(100 - index);
        card.style.opacity = visible ? String(1 - Math.min(index, 3) * 0.18) : "0";
        card.style.pointerEvents = index === 0 ? "auto" : "none";
        card.style.transform = `translate(${offset}px, ${offset}px) scale(${scale})`;
      });
    }

    async function checkSymbol() {
      const raw = els.symbolCheckInput.value.trim().toUpperCase();
      if (!raw) return;
      const symbol = raw.endsWith("USDT") ? raw : `${raw}USDT`;
      els.symbolCheckButton.disabled = true;
      els.symbolCheckButton.textContent = "...";
      try {
        const response = await fetch(`${BINANCE_TICKERS}?symbol=${encodeURIComponent(symbol)}`, { cache: "no-store" });
        const ticker = await response.json();
        if (Number(ticker.quoteVolume) >= settings().minVolume) {
          processPrice({ symbol, price: Number(ticker.lastPrice), volume: Number(ticker.quoteVolume) });
          els.lastTicker.textContent = symbol;
          renderMovers();
        }
      } catch { els.lastTicker.textContent = "ошибка"; }
      finally { els.symbolCheckButton.disabled = false; els.symbolCheckButton.textContent = "Проверить"; }
    }

    async function openChart(symbol) {
      activeChartSymbol = symbol;
      els.chartPop.hidden = false;
      resetChartView();
      await loadChart(symbol);
    }

    function closeChartPanel() {
      activeChartSymbol = null;
      els.chartPop.hidden = true;
    }

    async function loadChart(symbol = activeChartSymbol) {
      if (!symbol) return;
      els.chartTitle.textContent = `${symbol} ${activeTimeframe}`;
      try {
        const response = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${encodeURIComponent(symbol)}&interval=${encodeURIComponent(activeTimeframe)}&limit=500&_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error("chart request failed");
        const candles = (await response.json()).map((item) => ({ open: Number(item[1]), high: Number(item[2]), low: Number(item[3]), close: Number(item[4]), volume: Number(item[5]) })).filter((item) => Number.isFinite(item.open) && Number.isFinite(item.high) && Number.isFinite(item.low) && Number.isFinite(item.close));
        if (activeChartSymbol === symbol) { lastChartCandles = candles; drawChart(candles); }
      } catch {
        if (activeChartSymbol === symbol) { lastChartCandles = []; drawChart([]); }
      }
    }

    function drawChart(candles) {
      const canvas = els.chartCanvas;
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      ctx.clearRect(0, 0, rect.width, rect.height);
      if (!candles.length) { ctx.fillStyle = "#7f8794"; ctx.font = "14px Segoe UI, Arial"; ctx.fillText("Нет данных", 14, 28); return; }
      const pad = { left: 12, right: 58, top: 14, bottom: 30 };
      const plotW = Math.max(1, rect.width - pad.left - pad.right);
      const plotH = Math.max(1, rect.height - pad.top - pad.bottom);
      const candleWidth = chartView.candleWidth;
      const visibleCount = Math.max(8, Math.ceil(plotW / candleWidth) + 4);
      const blankSlots = Math.ceil(visibleCount * 0.9);
      chartView.offsetFromRight = clamp(chartView.offsetFromRight, -blankSlots, Math.max(0, candles.length - 1 + blankSlots));
      const rightIndex = candles.length - 1 - chartView.offsetFromRight;
      const startIndex = Math.floor(rightIndex - visibleCount + 1);
      const endIndex = Math.ceil(rightIndex);
      const visible = [];
      for (let index = startIndex; index <= endIndex; index += 1) if (candles[index]) visible.push({ ...candles[index], index });
      if (!visible.length) visible.push({ ...candles[Math.max(0, Math.min(candles.length - 1, Math.round(rightIndex)))], index: Math.max(0, Math.min(candles.length - 1, Math.round(rightIndex))) });
      const min = Math.min(...visible.map((item) => item.low));
      const max = Math.max(...visible.map((item) => item.high));
      const mid = (min + max) / 2;
      const range = Math.max((max - min) * chartView.priceZoom, Number.EPSILON);
      const shiftedMid = mid + chartView.pricePan * range;
      const low = shiftedMid - range / 2;
      const high = shiftedMid + range / 2;
      const bodyW = Math.max(1, Math.min(9, candleWidth * 0.62));
      const y = (price) => pad.top + (high - price) / range * plotH;
      const volumeMax = Math.max(1, ...visible.map((item) => Number(item.volume) || 0));
      const volumeH = Math.max(24, plotH * 0.16);
      const volumeBase = rect.height - pad.bottom - 1;
      ctx.strokeStyle = "rgba(255,255,255,.08)";
      ctx.lineWidth = 1;
      ctx.font = "11px Segoe UI, Arial";
      ctx.fillStyle = "#79808b";
      for (let i = 0; i < 6; i += 1) {
        const gy = pad.top + plotH * i / 5;
        const price = high - range * i / 5;
        ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(rect.width - pad.right, gy); ctx.stroke();
        ctx.fillText(formatAxisPrice(price), rect.width - pad.right + 8, gy + 4);
      }
      const xForIndex = (index) => rect.width - pad.right - (rightIndex - index) * candleWidth;
      visible.forEach((item) => {
        const x = xForIndex(item.index);
        const up = item.close >= item.open;
        const vh = ((Number(item.volume) || 0) / volumeMax) * volumeH;
        ctx.fillStyle = up ? "rgba(120,170,130,.34)" : "rgba(190,110,110,.34)";
        ctx.fillRect(x - bodyW / 2, volumeBase - vh, bodyW, vh);
      });
      visible.forEach((item) => {
        const x = xForIndex(item.index);
        const up = item.close >= item.open;
        const color = up ? "#36d84f" : "#e05252";
        const openY = y(item.open);
        const closeY = y(item.close);
        ctx.strokeStyle = color;
        ctx.beginPath(); ctx.moveTo(x, y(item.high)); ctx.lineTo(x, y(item.low)); ctx.stroke();
        ctx.fillStyle = color;
        ctx.fillRect(x - bodyW / 2, Math.min(openY, closeY), bodyW, Math.max(2, Math.abs(closeY - openY)));
      });
      ctx.strokeStyle = "rgba(255,255,255,.26)";
      ctx.beginPath(); ctx.moveTo(pad.left, rect.height - pad.bottom); ctx.lineTo(rect.width - pad.right, rect.height - pad.bottom); ctx.moveTo(rect.width - pad.right, pad.top); ctx.lineTo(rect.width - pad.right, rect.height - pad.bottom); ctx.stroke();
    }

    function formatAxisPrice(value) {
      if (!Number.isFinite(value)) return "-";
      if (value >= 100) return value.toFixed(2);
      if (value >= 1) return value.toFixed(4);
      if (value >= 0.01) return value.toFixed(5);
      return value.toPrecision(5);
    }

    function resetChartView() { chartView.candleWidth = 6; chartView.offsetFromRight = 0; chartView.priceZoom = 1; chartView.pricePan = 0; }
    function setActiveTimeframe(timeframe) {
      activeTimeframe = timeframe;
      els.timeframeButtons.forEach((button) => button.classList.toggle("active", button.dataset.timeframe === timeframe));
      resetChartView();
      loadChart();
    }
    function clamp(value, min, max) { return Math.min(Math.max(value, min), max); }
    function chunk(items, size) { const chunks = []; for (let i = 0; i < items.length; i += size) chunks.push(items.slice(i, i + size)); return chunks; }

    function startChartDrag(event, mode) {
      event.preventDefault();
      els.chartCanvas.classList.toggle("dragging", mode === "pan");
      const state = { mode, x: event.clientX, y: event.clientY, candleWidth: chartView.candleWidth, offsetFromRight: chartView.offsetFromRight, priceZoom: chartView.priceZoom, pricePan: chartView.pricePan };
      let frame = 0;
      function move(pointerEvent) { window.cancelAnimationFrame(frame); frame = window.requestAnimationFrame(() => updateChartDrag(pointerEvent, state)); }
      function stop() { els.chartCanvas.classList.remove("dragging"); window.cancelAnimationFrame(frame); window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", stop); window.removeEventListener("pointercancel", stop); drawChart(lastChartCandles); }
      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", stop, { once: true });
      window.addEventListener("pointercancel", stop, { once: true });
    }

    function updateChartDrag(event, state) {
      const dx = event.clientX - state.x;
      const dy = event.clientY - state.y;
      if (state.mode === "pan") { chartView.offsetFromRight = state.offsetFromRight + dx / chartView.candleWidth; chartView.pricePan = state.pricePan + dy / 260 / Math.max(chartView.priceZoom, .2); }
      if (state.mode === "time") chartView.candleWidth = clamp(state.candleWidth + dx * .045, 1.5, 34);
      if (state.mode === "price") chartView.priceZoom = clamp(state.priceZoom * Math.exp(dy * .006), .25, 6);
      drawChart(lastChartCandles);
    }

    async function boot() {
      window.clearInterval(pollTimer);
      window.clearInterval(streamHealthTimer);
      klineSignature = "";
      domSignature = "";
      qualifiedSymbols = new Set();
      watchedSymbols.clear();
      supportCandidates.clear();
      stopDomStreams();
      stopKlineStreams();
      stopTickerStream();
      setConnection("подключаюсь", false);
      els.streamStatus.textContent = "websocket";
      startTickerStream();
      await pollBinance();
      pollTimer = window.setInterval(pollBinance, POLL_MS);
      streamHealthTimer = window.setInterval(() => {
        if (!streamSocket || streamSocket.readyState > WebSocket.OPEN) scheduleStreamReconnect();
        if (klineSignature && (!klineSockets.length || klineSockets.some((socket) => socket.readyState > WebSocket.OPEN))) scheduleKlineReconnect();
        updateDomStreams();
        if (domSignature && (!domSockets.length || domSockets.some((socket) => socket.readyState > WebSocket.OPEN))) scheduleDomReconnect();
      }, 5000);
    }

    els.symbolCheckButton.addEventListener("click", checkSymbol);
    els.chartClose.addEventListener("click", closeChartPanel);
    els.chartCanvas.addEventListener("pointerdown", (event) => startChartDrag(event, "pan"));
    els.chartCanvas.addEventListener("wheel", (event) => { event.preventDefault(); const direction = event.deltaY > 0 ? -1 : 1; chartView.candleWidth = clamp(chartView.candleWidth + direction * 1.2, 1.5, 34); drawChart(lastChartCandles); }, { passive: false });
    els.chartTimeScale.addEventListener("pointerdown", (event) => startChartDrag(event, "time"));
    els.chartPriceScale.addEventListener("pointerdown", (event) => startChartDrag(event, "price"));
    els.timeframes.addEventListener("click", (event) => { const button = event.target.closest("[data-timeframe]"); if (button) setActiveTimeframe(button.dataset.timeframe); });
    window.addEventListener("resize", () => { if (!els.chartPop.hidden) drawChart(lastChartCandles); });
    els.symbolCheckInput.addEventListener("keydown", (event) => { if (event.key === "Enter") checkSymbol(); });
    boot();
  </script>
</body>
</html>
